<body>
	<script> var winner = function () { alert("WINNER!") };
		var loser = function () { alert("LOSER!") };
		// Простой тест
		winner();
		// Присваивание ссылок переменным
		var a = winner;
		var b = loser;
		var c = loser;
		a();
		b();
		// Проверяем удачу в игре “наперстки”
		c = a; // вин
		a = b; // луз
		b = c; // вин
		c = a; // луз
		a = c; //
		a = b;
		b = c;
		a(); //sdsdsdsds
	</script>
</body>
